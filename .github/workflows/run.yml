name: Daily Internship Alert
on:
  schedule:
    - cron: '0 12 * * *' # Triggers at 8:00 AM EST every single morning
  workflow_dispatch: # Allows manual force runs via the UI dashboard

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Check Script
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python tracker.py